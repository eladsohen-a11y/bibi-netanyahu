<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תצליחו להוציא אותו מהכלים?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- שכבת אפקטים על כל המסך -->
    <div id="fx-overlay"></div>

    <!-- באנר חדשות דחופות -->
    <div id="breaking" class="breaking hidden">
        <span class="breaking-tag">🚨 חדשות דחופות</span>
        <span id="breaking-text"></span>
    </div>

    <main class="stage">

        <!-- ===== מסך פתיחה ===== -->
        <section id="screen-start" class="screen">
            <h1 class="title big">תצליחו להוציא אותו מהכלים?</h1>
            <div class="mission">
                <p>הוא הפוליטיקאי הגדול בכל הזמנים!</p>
                <p>כולם ניסו לשבור אותו, אבל לקוסם תמיד יש עוד שפן בכובע.</p>
                <p id="best-line" class="best hidden"></p>
            </div>
            <div class="start-buttons">
                <button id="start-btn" class="cta">התחילו את האתגר</button>
                <button id="start-share-btn" class="share whatsapp start-share" aria-label="שיתוף בוואטסאפ">
                    <svg class="wa-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/>
                    </svg>
                    שיתוף
                </button>
            </div>
        </section>

        <!-- ===== מסך המשחק ===== -->
        <section id="screen-play" class="screen hidden">
            <div class="hud">
                <span class="hud-q" id="hud-q">שאלה 1/7</span>
                <span class="hud-spacer"></span>
                <span class="hud-stress">רמת לחץ: <span id="pressure-value">0%</span></span>
            </div>
            <div class="meter-bar big-meter"><div class="meter-fill" id="pressure-fill"></div></div>

            <div class="bibi-container">
                <div id="speech-bubble" class="speech-bubble hidden">
                    <p id="answer-text"></p>
                </div>
                <img id="bibi" src="images/bibi-idle.png" alt="ביבי">
                <div id="loading-line" class="loading-line hidden"></div>
                <div id="combo" class="combo hidden"></div>
                <div id="panic-badge" class="panic-badge hidden">🔴 מצב פאניקה</div>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="question"
                    placeholder="כתוב שאלה שאי אפשר להתחמק ממנה..."
                    autocomplete="off"
                >
                <button id="ask-btn">נסה לשבור אותו</button>
            </div>

            <div class="play-actions">
                <button id="card-btn" class="secondary">🃏 קלף שאלה</button>
                <button id="play-share-btn" class="share whatsapp start-share" aria-label="שיתוף בוואטסאפ">
                    <svg class="wa-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/>
                    </svg>
                    שיתוף
                </button>
                <button id="reset-btn" class="secondary">🔄 התחל מחדש</button>
            </div>
        </section>

        <!-- ===== מסך סיום ===== -->
        <section id="screen-end" class="screen hidden">
            <div class="end-card">
                <div id="end-icon" class="end-icon">🎤</div>
                <h2 id="end-rank" class="end-rank">כתב מקומי</h2>
                <div id="end-headline" class="end-headline"></div>
                <div class="end-stats">
                    <div class="end-stat"><span class="end-stat-label">רמת לחץ סופית</span><span id="end-stress" class="end-stat-value">0%</span></div>
                    <div class="end-stat"><span class="end-stat-label">שאלות</span><span id="end-questions" class="end-stat-value">0</span></div>
                </div>
                <p id="end-best" class="end-best"></p>
                <div class="end-buttons">
                    <button id="retry-btn" class="cta">נסה שוב</button>
                    <button id="share-btn" class="share whatsapp">שתף תוצאה בוואטסאפ</button>
                </div>
            </div>
        </section>

    </main>

    <!-- טוסט פידבק "+X לחץ" -->
    <div id="feedback-toast" class="feedback-toast hidden">
        <span id="feedback-delta" class="feedback-delta">+0</span>
        <span id="feedback-label" class="feedback-label"></span>
    </div>

    <!-- פופ-אפ הישג -->
    <div id="achievement" class="achievement hidden">
        <span class="achievement-icon" id="achievement-icon">🏆</span>
        <div class="achievement-body">
            <div class="achievement-title">הישג נפתח!</div>
            <div class="achievement-text" id="achievement-text"></div>
        </div>
    </div>

    <script src="responses.js"></script>
    <script src="script.js"></script>
</body>
</html>
