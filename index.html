<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מה ביבי היה אומר?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- שכבת אפקטים על כל המסך (פלאש, גליץ', אדום, blackout) -->
    <div id="fx-overlay"></div>

    <!-- באנר חדשות דחופות -->
    <div id="breaking" class="breaking hidden">
        <span class="breaking-tag">🚨 חדשות דחופות</span>
        <span id="breaking-text"></span>
    </div>

    <main class="stage">
        <h1 class="title">מה ביבי היה אומר?</h1>

        <div class="bibi-container">
            <div id="speech-bubble" class="speech-bubble hidden">
                <p id="answer-text"></p>
            </div>
            <img id="bibi" src="images/bibi-idle.png" alt="ביבי">
            <div id="loading-line" class="loading-line hidden"></div>
            <div id="combo" class="combo hidden"></div>
        </div>

        <div id="meters" class="meters hidden">
            <div class="meter">
                <span class="meter-label">רמת לחץ</span>
                <div class="meter-bar"><div class="meter-fill" id="pressure-fill"></div></div>
                <span class="meter-value" id="pressure-value">0%</span>
            </div>
            <div class="meter">
                <span class="meter-label" id="stat-label">ספין</span>
                <div class="meter-bar"><div class="meter-fill stat" id="stat-fill"></div></div>
                <span class="meter-value" id="stat-value">0%</span>
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="question"
                placeholder="כתוב שאלה או נושא... (נסה להפיל אותו)"
                autocomplete="off"
            >
            <button id="ask-btn">שאל את ביבי</button>
        </div>

        <div class="actions hidden" id="actions">
            <button id="another-btn" class="secondary">רוצה תשובה אחרת?</button>
            <button id="copy-btn" class="secondary">העתק</button>
            <button id="whatsapp-btn" class="share whatsapp">שתף בוואטסאפ</button>
        </div>
    </main>

    <!-- פופ-אפ הישג -->
    <div id="achievement" class="achievement hidden">
        <span class="achievement-icon" id="achievement-icon">🏆</span>
        <div class="achievement-body">
            <div class="achievement-title">הישג נפתח!</div>
            <div class="achievement-text" id="achievement-text"></div>
        </div>
    </div>

    <!-- טיקר חדשות חי -->
    <div id="ticker" class="ticker hidden">
        <span class="ticker-tag">ביבי לייב</span>
        <div class="ticker-window"><div class="ticker-track" id="ticker-track"></div></div>
    </div>

    <script src="responses.js"></script>
    <script src="script.js"></script>
</body>
</html>
